name: 每日自动抓取新闻

on:
  schedule:
    - cron: '0 0,12 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 获取代码库
      uses: actions/checkout@v3
    
    - name: 准备 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安装依赖包 (强制直接安装全家桶)
      run: pip install feedparser requests zhipuai sniffio httpx pydantic
      
    - name: 运行 智谱AI 读报机器人
      env:
        ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      run: python news_bot.py
      
    - name: 自动保存并发布
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add news_data.js
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 智谱AI 自动更新今日新闻"
        git push
