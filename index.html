<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今日政经简报</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="政经简报">
    <link rel="apple-touch-icon" href="./logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', 'Noto Serif SC', serif; -webkit-tap-highlight-color: transparent; }
        .news-card { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .news-card:active { transform: scale(0.98); background-color: #f1f5f9; }
        .active-tab { background-color: #334155 !important; color: white !important; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hot-badge { background: linear-gradient(135deg, #ef4444, #dc2626); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .summary-text { line-height: 1.8; letter-spacing: 0.02em; text-align: justify; }
        
        /* 默认隐藏滚动条（适配手机） */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 电脑端强制显示精美滚动条 */
        @media (min-width: 768px) {
            .no-scrollbar::-webkit-scrollbar { display: block !important; height: 8px !important; }
            .no-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
            .no-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
            .no-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
            .no-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-6 border-b border-slate-200 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">今日政经简报</h1>
            <p id="current-date" class="text-slate-500 mt-2 font-medium"></p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-8">
        <div class="flex overflow-x-auto space-x-2 pb-4 no-scrollbar mb-8 sticky top-[88px] bg-slate-50/95 backdrop-blur-sm py-2 z-40">
            <button onclick="filterNews('all')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap active-tab">全部</button>
            <button onclick="filterNews('FT中文网')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap">FT中文网</button>
            <button onclick="filterNews('BBC')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap">BBC</button>
            <button onclick="filterNews('纽约时报')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap">纽约时报</button>
            <button onclick="filterNews('华尔街日报')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap">华尔街日报</button>
            <button onclick="filterNews('36氪')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap">36氪</button>
            <button onclick="filterNews('雅虎财经')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap">雅虎财经</button>
            <button onclick="filterNews('CNBC')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap">CNBC</button>
            <button onclick="filterNews('联合早报')" class="tab-btn px-5 py-2.5 rounded-full bg-white text-slate-600 font-semibold text-sm shadow-sm border border-slate-200 whitespace-nowrap">联合早报</button>
        </div>

        <div id="news-container" class="space-y-6">
            <div class="flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-slate-600"></div>
            </div>
        </div>
    </main>

    <script src="./news_data.js"></script>
    <script>
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', options);
        }

        function renderNews(filter = 'all') {
            const container = document.getElementById('news-container');
            if (typeof newsData === 'undefined') {
                container.innerHTML = '<div class="text-center py-20 text-slate-400">正在抓取今日新闻，请稍后刷新...</div>';
                return;
            }

            let filtered = filter === 'all' ? newsData : newsData.filter(item => item.source === filter);
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-slate-400">该平台暂无今日更新。</div>';
                return;
            }

            container.innerHTML = filtered.map((item, index) => `
                <div class="news-card bg-white rounded-2xl p-6 shadow-sm border border-slate-100 relative">
                    ${index < 3 && filter !== 'all' ? '<span class="hot-badge absolute -top-2 -left-2 text-[10px] text-white px-2 py-0.5 rounded-lg font-bold shadow-sm">TOP热点</span>' : ''}
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">${item.source}</span>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800 mb-4 leading-snug"><a href="${item.link}" target="_blank">${item.title}</a></h2>
                    <div class="bg-slate-50 rounded-xl p-4 border-l-2 border-slate-200">
                        <p class="text-slate-600 text-[15px] summary-text leading-relaxed">
                            <span class="font-bold text-slate-400 mr-1 text-xs italic">深度总结:</span>
                            ${item.summary}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        function filterNews(source) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active-tab', btn.innerText === (source === 'all' ? '全部' : source));
            });
            renderNews(source);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        updateDate();
        setTimeout(() => renderNews('all'), 500);
    </script>
</body>
</html>
